---
layout: default
---
<div class="project">

  <header class="post-header">
    <h1 class="post-title">{{ page.title }}</h1>
    <div class="project-meta">
      <p>{{ page.project-description }}</p>
      
      {% if page.project-url %}
      {% include project-url.html %}
      {% endif %}
  </div>
  </header>
  
  <article class="post-content">  
    {{ content }}
  </article>

{% if page.previous.url %} 
    <a class="prev" href="{{page.previous.url}}">Previous Project</a> 
  {% endif %}
{% if page.next.url %} 
    <a class="next" href="{{page.next.url}}">Next Project</a> 
  {% endif %}
  
</div>
