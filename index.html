---
layout: default
---

<div class="home">

  <ul class="post-list">
    {% for post in site.posts %}
      <li>
	      <a class="post-link" href="{{ post.url | prepend: site.baseurl }}">
	      <img src="{{ post.thumb }}">
	      <h3>{{ post.title }}</h3>
	      </a>
      </li>
    {% endfor %}
  </ul>

</div>
