---
layout: default-test
---

<style>

.flex-container {
	display:flex;
	flex-flow: row wrap;
	justify-content:space-between;
}

.flex-item{
	width:301px;
}

</style>

<div class="flex-container">


    {% for post in site.posts %}
      <div class="flex-item">
	      <a class="post-link" href="{{ post.url | prepend: site.baseurl }}">
	      <img src="{{ post.thumb }}">
	      <h3>{{ post.title }}</h3>
	      </a>
      </div>
    {% endfor %}


</div>
